<!DOCTYPE html>
<html>
<head>
    <title>Panel de reservas</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        @media (max-width:768px){
            h1{ font-size:24px; }
            h4{ font-size:18px; }
            table{ font-size:13px; }
            .btn{ font-size:13px; }
        }
    </style>

</head>
<body class="bg-light">

<div class="container-fluid py-4 px-3 px-md-4">

<div class="d-flex justify-content-between align-items-center mb-4">

    <h1 class="m-0">Panel de reservas</h1>

    <div class="d-flex gap-2">
        <!-- BOTÓN NUEVO -->
        <a href="/reservar.html" class="btn btn-primary">
            Nueva reserva
        </a>

        <a href="/logout" class="btn btn-danger">
            Cerrar sesión
        </a>
    </div>

</div>

<!-- ================= BUSCAR CLIENTE ================= -->

<div class="card shadow-sm mb-4">
    <div class="card-body">

        <h4 class="mb-3">Registrar asistencia</h4>

        <div class="row g-2 align-items-end">
            <div class="col-12 col-md-5">
                <input type="text" id="dniInput" class="form-control" placeholder="Ingresar DNI del cliente">
            </div>

            <div class="col-12 col-md-3">
                <button onclick="buscarCliente()" class="btn btn-primary w-100">
                    Buscar cliente
                </button>
            </div>
        </div>

        <div id="infoCliente" class="mt-3"></div>

        <button id="btnAsistencia"
                class="btn btn-success mt-3 w-100 w-md-auto"
                style="display:none;"
                onclick="confirmarAsistencia()">
            Confirmar asistencia de hoy
        </button>

        <div id="clienteBuscadoTabla" class="mt-4"></div>

        <div id="panelClasesBuscado" class="mt-4"></div>

    </div>
</div>

<!-- ================= CALENDARIO ================= -->

<div class="card shadow-sm mb-4">
    <div class="card-body">

        <h4 class="mb-3">Calendario semanal</h4>

        <div class="d-flex flex-column flex-md-row gap-2 mb-3">
            <button id="btnSemanaAnt" type="button" class="btn btn-outline-secondary w-100 w-md-auto">Semana anterior</button>
            <button id="btnSemanaAct" type="button" class="btn btn-outline-dark w-100 w-md-auto">Semana actual</button>
            <button id="btnSemanaSig" type="button" class="btn btn-outline-secondary w-100 w-md-auto">Semana siguiente</button>
        </div>

        <h5 id="tituloSemana" class="mb-3 text-center text-md-start"></h5>

        <div class="table-responsive">
            <table class="table table-bordered text-center align-middle" id="tablaCalendario"></table>
        </div>

    </div>
</div>

<!-- ================= TABLA GENERAL ================= -->

<div class="card shadow-sm">
    <div class="card-body">

        <h4 class="mb-3">Clientes registrados</h4>

        <div class="table-responsive">
            <table class="table table-striped table-hover">

                <thead class="table-dark">
                    <tr>
                        <th>Nombre</th>
                        <th>DNI</th>
                        <th>Teléfono</th>
                        <th>Pack</th>
                        <th>Clases</th>
                        <th>Restantes</th>
                        <th>Recordatorio</th>
                    </tr>
                </thead>

                <tbody id="tabla"></tbody>

            </table>
        </div>

    </div>
</div>

</div>

<script>

let clientesGlobal = {};
let semanaOffset = 0;
const horarios = ["08:00","09:00","10:00","11:00","16:00","17:00","18:00","19:00"];
const opcionesFetch = { credentials: "include", headers: { "Content-Type": "application/json" } };

async function cargarReservas() {
  const r = await fetch("/reservas", { ...opcionesFetch, cache: "no-store" });
  if (r.status === 401 || r.status === 403) return window.location = "/login";
  const datos = await r.json();

  clientesGlobal = {};
  datos.forEach(r => {
    const key = String(r.dni).trim();
    if (!clientesGlobal[key]) clientesGlobal[key] = [];
    clientesGlobal[key].push(r);
  });

  pintarClientes();
  await cargarCalendario();
}

function pintarClientes() {
  const tabla = document.getElementById("tabla");
  if (!tabla) return;
  tabla.innerHTML = "";

  const keys = Object.keys(clientesGlobal).sort();
  if (keys.length === 0) {
    tabla.innerHTML = "<tr><td colspan='7'>No hay clientes</td></tr>";
    return;
  }

  keys.forEach(dni => {
    const lista = clientesGlobal[dni];
    const cli = lista[0];
    const restantes = lista.filter(r => String(r.asistida) === "0").length;
    tabla.innerHTML += `
      <tr>
        <td>${cli.nombre}</td>
        <td>${cli.dni}</td>
        <td>${cli.telefono}</td>
        <td>${cli.pack}</td>
        <td>${lista.length}</td>
        <td>${restantes}</td>
        <td><button type="button" class="btn btn-sm btn-primary" onclick="mostrarClases('${dni}')">Info</button></td>
      </tr>`;
  });
}

function obtenerLunes() {
  const hoy = new Date();
  const target = new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate() + (semanaOffset * 7));
  const diaSemana = (target.getDay() + 6) % 7;
  const lunes = new Date(target);
  lunes.setDate(target.getDate() - diaSemana);
  lunes.setHours(0,0,0,0);
  return lunes;
}

async function cargarCalendario() {
  console.log("cargarCalendario offset", semanaOffset);
  const res = await fetch("/reservas", { ...opcionesFetch, cache: "no-store" });
  if (res.status === 401 || res.status === 403) return window.location.href = "/login";
  const datos = await res.json();

  const lunes = obtenerLunes();
  const dias = [];
  for (let i = 0; i < 5; i++) {
    const d = new Date(lunes);
    d.setDate(lunes.getDate() + i);
    const fecha = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    dias.push(fecha);
  }

  document.getElementById("tituloSemana").innerText =
    `Semana del ${dias[0]} al ${dias[4]}`;

  const tabla = document.getElementById("tablaCalendario");
  tabla.innerHTML = `
    <tr>
      <th>Hora</th><th>Lunes</th><th>Martes</th><th>Miércoles</th><th>Jueves</th><th>Viernes</th>
    </tr>`;

  horarios.forEach(hora => {
    let fila = `<tr><td><b>${hora}</b></td>`;
    dias.forEach(dia => {
      const personas = datos.filter(r => r.dia === dia && r.hora === hora).slice(0,4);
      let contenido = "";
      personas.forEach(p => {
        const color = p.asistida == 1 ? "bg-success" : "bg-warning";
        contenido += `<div class="${color} text-white rounded p-1 mb-1 small">${p.nombre}</div>`;
      });
      fila += `<td>${contenido}</td>`;
    });
    fila += "</tr>";
    tabla.innerHTML += fila;
  });
}

async function confirmarAsistencia() {
  const dni = document.getElementById("dniInput").value.trim();
  if (!dni) return alert("Ingresá DNI");
  const res = await fetch("/asistencia", {
    method: "POST",
    ...opcionesFetch,
    body: JSON.stringify({ dni })
  });
  const text = await res.text();
  alert(text);
  if (res.ok) await cargarReservas();
}

function cambiarSemana(valor) {
  valor = Number(valor) || 0;
  if (valor === 0) return;
  semanaOffset += valor;
  console.log("cambiarSemana", valor, "semanaOffset=", semanaOffset);
  cargarCalendario();
}
function irSemanaActual() {
  semanaOffset = 0;
  console.log("irSemanaActual", "semanaOffset=", semanaOffset);
  cargarCalendario();
}

function mostrarClases(dni) {
  const lista = clientesGlobal[String(dni)] || [];
  if (!lista.length) return alert("No hay clases para ese cliente");
  const texto = lista.map(r => `${r.dia} ${r.hora} - ${r.asistida==1 ? "asistió" : "pendiente"}`).join("\n");
  alert(`Clases de ${dni}:\n${texto}`);
}

async function buscarCliente() {
  const dni = document.getElementById("dniInput").value.trim();
  if (!dni) { return; }
  const lista = clientesGlobal[String(dni)] || [];
  if (!lista.length) {
    document.getElementById("infoCliente").innerText = "Cliente no encontrado";
    document.getElementById("btnAsistencia").style.display = "none";
    document.getElementById("clienteBuscadoTabla").innerHTML = "";
    return;
  }
  const cliente = lista[0];
  const restantes = lista.filter(x => x.asistida == 0).length;
  document.getElementById("infoCliente").innerHTML =
    `<strong>Nombre:</strong> ${cliente.nombre} | <strong>Restantes:</strong> ${restantes}`;
  document.getElementById("btnAsistencia").style.display = "block";
  document.getElementById("clienteBuscadoTabla").innerHTML =
    `<div class="table-responsive mt-3">
      <table class="table table-bordered">
        <tr><th>Nombre</th><th>DNI</th><th>Teléfono</th><th>Pack</th><th>Restantes</th></tr>
        <tr class="table-light"><td>${cliente.nombre}</td><td>${cliente.dni}</td><td>${cliente.telefono}</td><td>${cliente.pack}</td><td>${restantes}</td></tr>
      </table>
    </div>`;
}

document.addEventListener("DOMContentLoaded", cargarReservas);

document.getElementById("btnSemanaAnt").addEventListener("click", () => cambiarSemana(-1));
document.getElementById("btnSemanaAct").addEventListener("click", irSemanaActual);
document.getElementById("btnSemanaSig").addEventListener("click", () => cambiarSemana(1));
document.getElementById("buscarClienteBtn").addEventListener("click", buscarCliente);
document.getElementById("btnAsistencia").addEventListener("click", confirmarAsistencia);

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
