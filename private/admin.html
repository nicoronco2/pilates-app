<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de reservas</title>
    <link rel="icon" type="image/png" href="/ataraxia-logo.png">
    <link rel="apple-touch-icon" href="/ataraxia-logo.png">

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .top-actions{
            flex-wrap:wrap;
        }

        #themeToggleBtn{
            min-width:140px;
        }

        [data-bs-theme="dark"] body{
            background:#111418 !important;
        }

        [data-bs-theme="dark"] .bg-light{
            background:#111418 !important;
        }

        [data-bs-theme="dark"] .card{
            background:#1a1f26;
            border-color:#2a313a;
        }

        [data-bs-theme="dark"] .table{
            --bs-table-bg:#1a1f26;
            --bs-table-striped-bg:#20262f;
            --bs-table-hover-bg:#252c36;
            --bs-table-color:#e9ecef;
            --bs-table-border-color:#313844;
        }

        [data-bs-theme="dark"] .table-dark{
            --bs-table-bg:#0f1318;
            --bs-table-color:#f8f9fa;
        }

        .warning-summary{
            border-radius:16px;
        }

        .warning-summary ul{
            margin:0;
            padding-left:1.2rem;
        }

        .warning-summary li + li{
            margin-top:.4rem;
        }

        .filters-panel{
            border:1px solid rgba(0,0,0,0.08);
            border-radius:16px;
            padding:14px;
            background:rgba(248,249,250,0.9);
        }

        .filters-meta{
            color:#6c757d;
            font-size:.95rem;
        }

        .client-history-card{
            border:1px solid rgba(0,0,0,0.08);
            border-radius:18px;
            padding:18px;
            background:rgba(248,249,250,0.9);
        }

        .history-metrics{
            display:grid;
            gap:12px;
            grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));
        }

        .history-metric{
            border-radius:14px;
            padding:14px;
            background:rgba(255,255,255,0.95);
            border:1px solid rgba(0,0,0,0.08);
        }

        .history-metric-label{
            color:#6c757d;
            font-size:.84rem;
            margin-bottom:4px;
        }

        .history-metric-value{
            font-size:1.45rem;
            font-weight:700;
            line-height:1;
        }

        .history-block{
            border:1px solid rgba(0,0,0,0.08);
            border-radius:16px;
            padding:14px;
            background:rgba(255,255,255,0.92);
        }

        .history-list{
            display:grid;
            gap:10px;
        }

        .history-item{
            border-radius:14px;
            padding:12px;
            border:1px solid rgba(0,0,0,0.08);
            background:#fff;
        }

        .history-item-header{
            display:flex;
            flex-wrap:wrap;
            justify-content:space-between;
            gap:8px;
        }

        .history-item-meta{
            color:#6c757d;
            font-size:.92rem;
        }

        .admin-metrics{
            display:grid;
            gap:14px;
            grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
        }

        .admin-metric-card{
            border:1px solid rgba(0,0,0,0.08);
            border-radius:18px;
            padding:16px;
            background:rgba(248,249,250,0.94);
            box-shadow:0 8px 18px rgba(0,0,0,0.04);
        }

        .admin-metric-label{
            color:#6c757d;
            font-size:.84rem;
            text-transform:uppercase;
            letter-spacing:.06em;
            margin-bottom:6px;
        }

        .admin-metric-value{
            font-size:1.8rem;
            font-weight:700;
            line-height:1;
            margin-bottom:6px;
        }

        .admin-metric-help{
            color:#6c757d;
            font-size:.92rem;
            line-height:1.4;
            min-height:2.6em;
        }

        .waitlist-empty{
            color:#6c757d;
            font-size:.95rem;
        }

        .renew-note{
            display:block;
            margin-top:6px;
            color:#6c757d;
            font-size:.85rem;
            line-height:1.35;
        }

        [data-bs-theme="dark"] .filters-panel{
            background:#141922;
            border-color:#2a313a;
        }

        [data-bs-theme="dark"] .admin-metric-card{
            background:#141922;
            border-color:#2a313a;
            box-shadow:none;
        }

        [data-bs-theme="dark"] .client-history-card,
        [data-bs-theme="dark"] .history-block{
            background:#141922;
            border-color:#2a313a;
        }

        [data-bs-theme="dark"] .history-metric,
        [data-bs-theme="dark"] .history-item{
            background:#1a1f26;
            border-color:#2a313a;
        }

        [data-bs-theme="dark"] .history-metric-label,
        [data-bs-theme="dark"] .history-item-meta,
        [data-bs-theme="dark"] .admin-metric-label,
        [data-bs-theme="dark"] .admin-metric-help,
        [data-bs-theme="dark"] .waitlist-empty,
        [data-bs-theme="dark"] .renew-note{
            color:#adb5bd;
        }

        @media (max-width:768px){
            h1{ font-size:24px; }
            h4{ font-size:18px; }
            table{ font-size:13px; }
            .btn{ font-size:13px; }
        }
    </style>

</head>
<body class="bg-light">

<div class="container-fluid py-4 px-3 px-md-4">

<div class="d-flex justify-content-between align-items-center mb-4">

    <h1 class="m-0">Panel de reservas</h1>

    <div class="d-flex gap-2 top-actions">
        <!-- BOTÓN NUEVO -->
        <a href="/reservar.html" class="btn btn-primary">
            Nueva reserva
        </a>

        <button id="themeToggleBtn" type="button" class="btn btn-outline-secondary">
            Modo oscuro
        </button>

        <a href="/logout" class="btn btn-danger">
            Cerrar sesión
        </a>
    </div>

</div>

<div id="adminMetricas" class="admin-metrics mb-4"></div>

<div class="card shadow-sm mb-4">
    <div class="card-body">

        <h4 class="mb-3">Lista de espera</h4>

        <form id="formListaEspera" class="row g-2">
            <div class="col-12 col-md-4">
                <input type="text" id="esperaNombre" class="form-control" placeholder="Nombre" required>
            </div>
            <div class="col-12 col-md-3">
                <input type="text" id="esperaTelefono" class="form-control" placeholder="Teléfono" required>
            </div>
            <div class="col-12 col-md-2">
                <input type="text" id="esperaDni" class="form-control" placeholder="DNI" required>
            </div>
            <div class="col-6 col-md-2">
                <input type="date" id="esperaDia" class="form-control" required>
            </div>
            <div class="col-6 col-md-1">
                <select id="esperaHora" class="form-select" required>
                    <option value="">Hora</option>
                    <option value="08:00">08:00</option>
                    <option value="09:00">09:00</option>
                    <option value="10:00">10:00</option>
                    <option value="11:00">11:00</option>
                    <option value="16:00">16:00</option>
                    <option value="17:00">17:00</option>
                    <option value="18:00">18:00</option>
                    <option value="19:00">19:00</option>
                </select>
            </div>
            <div class="col-12 d-grid d-md-flex justify-content-md-end mt-2">
                <button type="submit" class="btn btn-primary">Agregar a lista de espera</button>
            </div>
        </form>

        <div id="listaEsperaTabla" class="mt-4"></div>

    </div>
</div>

<!-- ================= BUSCAR CLIENTE ================= -->

<div class="card shadow-sm mb-4">
    <div class="card-body">

        <h4 class="mb-3">Registrar asistencia</h4>

        <div class="row g-2 align-items-end">
            <div class="col-12 col-md-5">
                <input type="text" id="dniInput" class="form-control" placeholder="Ingresar DNI del cliente">
            </div>

            <div class="col-12 col-md-3">
                <button id="buscarClienteBtn" type="button" class="btn btn-primary w-100">
                    Buscar cliente
                </button>
            </div>
        </div>

        <div id="infoCliente" class="mt-3"></div>

        <button id="btnAsistencia"
                type="button"
                class="btn btn-success mt-3 w-100 w-md-auto"
                style="display:none;">
            Confirmar asistencia de hoy
        </button>

        <div id="clienteBuscadoTabla" class="mt-4"></div>

        <div id="panelClasesBuscado" class="mt-4"></div>

    </div>
</div>

<!-- ================= CALENDARIO ================= -->

<div class="card shadow-sm mb-4">
    <div class="card-body">

        <h4 class="mb-3">Calendario semanal</h4>

        <div class="d-flex flex-column flex-md-row gap-2 mb-3">
            <button id="btnSemanaAnt" type="button" class="btn btn-outline-secondary w-100 w-md-auto">Semana anterior</button>
            <button id="btnSemanaAct" type="button" class="btn btn-outline-dark w-100 w-md-auto">Semana actual</button>
            <button id="btnSemanaSig" type="button" class="btn btn-outline-secondary w-100 w-md-auto">Semana siguiente</button>
        </div>

        <h5 id="tituloSemana" class="mb-3 text-center text-md-start"></h5>

        <div class="table-responsive">
            <table class="table table-bordered text-center align-middle" id="tablaCalendario"></table>
        </div>

    </div>
</div>

<!-- ================= TABLA GENERAL ================= -->

<div class="card shadow-sm">
    <div class="card-body">

        <h4 class="mb-3">Clientes registrados</h4>
        <div id="packsPorVencer" class="mb-3"></div>
        <div class="filters-panel mb-3">
            <div class="row g-2">
                <div class="col-12 col-lg-5">
                    <input type="text" id="filtroBusqueda" class="form-control" placeholder="Buscar por nombre, DNI o teléfono">
                </div>
                <div class="col-12 col-sm-6 col-lg-3">
                    <select id="filtroPack" class="form-select">
                        <option value="">Todos los packs</option>
                        <option value="4">4 clases</option>
                        <option value="8">8 clases</option>
                        <option value="12">12 clases</option>
                        <option value="16">16 clases</option>
                    </select>
                </div>
                <div class="col-12 col-sm-6 col-lg-3">
                    <select id="filtroEstadoPack" class="form-select">
                        <option value="">Todos los estados</option>
                        <option value="por-vencer">Packs por vencer</option>
                        <option value="avisar">Conviene avisar renovación</option>
                        <option value="agotado">Pack agotado</option>
                        <option value="en-curso">Pack en curso</option>
                    </select>
                </div>
                <div class="col-12 col-lg-1 d-grid">
                    <button type="button" id="limpiarFiltrosBtn" class="btn btn-outline-secondary">Limpiar</button>
                </div>
            </div>
            <div id="resumenFiltros" class="filters-meta mt-2"></div>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover">

                <thead class="table-dark">
                    <tr>
                        <th>Nombre</th>
                        <th>DNI</th>
                        <th>Teléfono</th>
                        <th>Pack</th>
                        <th>Clases</th>
                        <th>Restantes</th>
                        <th>Recordatorio</th>
                        <th>Clases</th>
                        <th>Acción</th>
                    </tr>
                </thead>

                <tbody id="tabla"></tbody>

            </table>
        </div>

    </div>
</div>

</div>
<script src="/admin.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
