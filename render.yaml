services:
  - type: web
    name: pilates-app
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SESSION_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false

  - type: web
    name: ataraxia-pilates-web
    runtime: static
    buildCommand: ""
    staticPublishPath: ./wakeup-site
