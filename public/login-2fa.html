<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificación en dos pasos</title>
<link rel="icon" type="image/png" href="/ataraxia-logo.png">
<link rel="apple-touch-icon" href="/ataraxia-logo.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f3f4f6;
}

.card-login{
    max-width:420px;
    margin:auto;
    margin-top:80px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.authy-helper{
    display:flex;
    flex-direction:column;
    gap:12px;
}
</style>
</head>
<body>

<div class="container">
    <div class="card card-login p-4">
        <h3 class="text-center mb-3">Verificación en dos pasos</h3>
        <p class="text-center text-body-secondary mb-4">
            Ingresá el código de 6 dígitos generado en tu aplicación autenticadora.
        </p>

        <form method="POST" action="/login-2fa">
            <input type="hidden" name="_csrf" id="csrfToken">

            <div class="authy-helper mb-3">
                <button id="openAuthyBtn" type="button" class="btn btn-outline-secondary">
                    Abrir Authy
                </button>

                <div class="small text-body-secondary">
                    Si Authy está instalado en este dispositivo, el botón intenta abrir la app automáticamente.
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Código</label>
                <input type="text" name="codigo" class="form-control" inputmode="numeric" autocomplete="one-time-code" maxlength="6" required>
            </div>

            <button class="btn btn-primary w-100">Verificar e ingresar</button>
        </form>
    </div>
</div>

<script>
const csrfCookie = document.cookie
    .split("; ")
    .find((row) => row.startsWith("pilates-csrf="))
    ?.split("=")[1];

if (csrfCookie) {
    document.getElementById("csrfToken").value = decodeURIComponent(csrfCookie);
}

document.getElementById("openAuthyBtn")?.addEventListener("click", () => {
    window.location.href = "authy://";
});
</script>

</body>
</html>
