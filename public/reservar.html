<!DOCTYPE html>
<html>
<head>
    <title>Reservar clase</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        @media (max-width:576px){
            h2{ font-size:24px; }
            .card-body{ padding:20px 15px; }
        }
    </style>

</head>
<body class="bg-light">

<div class="container py-4 py-md-5">

    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6">

            <div class="card shadow-sm">
                <div class="card-body">

                    <h2 class="text-center mb-4">Reserva de clases</h2>

                    <form id="formReserva">

                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" id="nombre" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Teléfono</label>
                            <input type="text" id="telefono" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">DNI</label>
                            <input type="text" id="dni" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Elegir pack</label>

                            <select id="pack" class="form-select" required>
                                <option value="">Elegí un pack</option>
                                <option value="4">1 vez por semana (4 clases)</option>
                                <option value="8">2 veces por semana (8 clases)</option>
                                <option value="12">3 veces por semana (12 clases)</option>
                                <option value="16">4 veces por semana (16 clases)</option>
                            </select>
                        </div>

                        <!-- CLASES DINÁMICAS -->
                        <div id="clasesContainer" class="mt-3"></div>

                        <button type="submit" class="btn btn-primary w-100 mt-4">
                            Reservar clases
                        </button>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

<!-- SCRIPT EXTERNO (🔥 CLAVE) -->
<script src="/script.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
