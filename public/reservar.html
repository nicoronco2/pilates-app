<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservar clase</title>
    <link rel="icon" type="image/png" href="/ataraxia-logo.png">
    <link rel="apple-touch-icon" href="/ataraxia-logo.png">

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root{
            color-scheme: light;
        }

        .header-row{
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:12px;
            margin-bottom:1.25rem;
        }

        #themeToggleBtn{
            white-space:nowrap;
        }

        .clase{
            transition:background-color .2s ease,border-color .2s ease,box-shadow .2s ease;
        }

        [data-bs-theme="dark"] body{
            background:
                radial-gradient(circle at top, rgba(62, 109, 192, 0.12), transparent 35%),
                #111418 !important;
        }

        [data-bs-theme="dark"] .bg-light{
            background:#111418 !important;
        }

        [data-bs-theme="dark"] .card{
            background:#171c24;
            border-color:#2a3442;
            box-shadow:0 20px 50px rgba(0,0,0,.28) !important;
        }

        [data-bs-theme="dark"] .card-body{
            color:#e8edf6;
        }

        [data-bs-theme="dark"] h2,
        [data-bs-theme="dark"] .form-label,
        [data-bs-theme="dark"] .clase h5{
            color:#f5f7fb;
        }

        [data-bs-theme="dark"] #themeToggleBtn{
            border-color:#4f6481;
            color:#d8e3f3;
            background:rgba(79, 100, 129, 0.15);
        }

        [data-bs-theme="dark"] #themeToggleBtn:hover{
            background:rgba(79, 100, 129, 0.28);
            border-color:#6d89b0;
            color:#ffffff;
        }

        [data-bs-theme="dark"] .form-control,
        [data-bs-theme="dark"] .form-select{
            background:#2b3545;
            border-color:#3c4960;
            color:#f4f7fb;
        }

        [data-bs-theme="dark"] .form-control::placeholder{
            color:#9eb0ca;
        }

        [data-bs-theme="dark"] .form-control:focus,
        [data-bs-theme="dark"] .form-select:focus{
            background:#313d50;
            border-color:#71a7ff;
            box-shadow:0 0 0 .25rem rgba(64, 130, 255, .18);
            color:#ffffff;
        }

        [data-bs-theme="dark"] .clase{
            background:linear-gradient(180deg, #202836 0%, #1a2230 100%) !important;
            border-color:#334156 !important;
            box-shadow:0 14px 30px rgba(0,0,0,.22) !important;
        }

        [data-bs-theme="dark"] .clase .form-label{
            color:#c7d4e7;
        }

        [data-bs-theme="dark"] .alert-info{
            background:#16263d;
            border-color:#295487;
            color:#d8e9ff;
        }

        [data-bs-theme="dark"] .alert-warning{
            background:#36270f;
            border-color:#8d6118;
            color:#ffe8b0;
        }

        @media (max-width:576px){
            h2{ font-size:24px; }
            .card-body{ padding:20px 15px; }
            .header-row{
                align-items:flex-start;
                flex-direction:column;
            }
        }
    </style>

</head>
<body class="bg-light">

<div class="container py-4 py-md-5">

    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6">

            <div class="card shadow-sm">
                <div class="card-body">

                    <div class="header-row">
                        <h2 class="m-0">Reserva de clases</h2>
                        <button id="themeToggleBtn" type="button" class="btn btn-outline-secondary btn-sm">
                            Modo oscuro
                        </button>
                    </div>

                    <div id="prefillNotice" class="alert alert-info d-none" role="alert"></div>

                    <form id="formReserva">

                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" id="nombre" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Teléfono</label>
                            <input type="text" id="telefono" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">DNI</label>
                            <input type="text" id="dni" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Elegir pack</label>

                            <select id="pack" class="form-select" required>
                                <option value="">Elegí un pack</option>
                                <option value="4">1 vez por semana (4 clases)</option>
                                <option value="8">2 veces por semana (8 clases)</option>
                                <option value="12">3 veces por semana (12 clases)</option>
                                <option value="16">4 veces por semana (16 clases)</option>
                            </select>
                        </div>

                        <!-- CLASES DINÁMICAS -->
                        <div id="clasesContainer" class="mt-3"></div>

                        <button type="submit" class="btn btn-primary w-100 mt-4">
                            Reservar clases
                        </button>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

<!-- SCRIPT EXTERNO (🔥 CLAVE) -->
<script src="/script.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
