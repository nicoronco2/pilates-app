<!DOCTYPE html>
<html>
<head>
    <title>Panel de reservas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        @media (max-width:768px){
            h1{ font-size:24px; }
            h4{ font-size:18px; }
            table{ font-size:13px; }
            .btn{ font-size:13px; }
        }
    </style>
</head>

<body class="bg-light">

<div class="container-fluid py-4 px-3 px-md-4">

<div class="d-flex justify-content-between align-items-center mb-4">

    <h1 class="m-0">Panel de reservas</h1>

    <div class="d-flex gap-2">
        <a href="/reservar.html" class="btn btn-primary">Nueva reserva</a>
        <a href="/logout" class="btn btn-danger">Cerrar sesión</a>
    </div>

</div>

<!-- BUSCAR CLIENTE -->
<div class="card shadow-sm mb-4">
<div class="card-body">

<h4 class="mb-3">Registrar asistencia</h4>

<div class="row g-2 align-items-end">
    <div class="col-12 col-md-5">
        <input type="text" id="dniInput" class="form-control" placeholder="Ingresar DNI del cliente">
    </div>

    <div class="col-12 col-md-3">
        <button onclick="buscarCliente()" class="btn btn-primary w-100">Buscar cliente</button>
    </div>
</div>

<div id="infoCliente" class="mt-3"></div>

<button id="btnAsistencia"
        class="btn btn-success mt-3 w-100"
        style="display:none;"
        onclick="confirmarAsistencia()">
    Confirmar asistencia de hoy
</button>

<div id="clienteBuscadoTabla" class="mt-4"></div>
<div id="panelClasesBuscado" class="mt-4"></div>

</div>
</div>

<!-- CALENDARIO -->
<div class="card shadow-sm mb-4">
<div class="card-body">

<h4 class="mb-3">Calendario semanal</h4>

<div class="d-flex gap-2 mb-3">
    <button onclick="cambiarSemana(-1)" class="btn btn-outline-secondary">Semana anterior</button>
    <button onclick="irSemanaActual()" class="btn btn-outline-dark">Semana actual</button>
    <button onclick="cambiarSemana(1)" class="btn btn-outline-secondary">Semana siguiente</button>
</div>

<h5 id="tituloSemana"></h5>

<div class="table-responsive">
    <table class="table table-bordered text-center" id="tablaCalendario"></table>
</div>

</div>
</div>

<!-- TABLA -->
<div class="card shadow-sm">
<div class="card-body">

<h4 class="mb-3">Clientes registrados</h4>

<div class="table-responsive">
<table class="table table-striped table-hover">
<thead class="table-dark">
<tr>
<th>Nombre</th>
<th>DNI</th>
<th>Teléfono</th>
<th>Pack</th>
<th>Clases</th>
<th>Restantes</th>
<th></th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>
</div>

</div>
</div>

</div>

<script>

let clientesGlobal = {};
let semanaOffset = 0;

const horarios = [
"08:00","09:00","10:00","11:00",
"16:00","17:00","18:00","19:00"
];

/* ================= CARGAR RESERVAS ================= */

async function cargarReservas() {

    try {

        const res = await fetch("/reservas", {
            credentials: "include"
        });

        console.log("STATUS:", res.status);

        if (!res.ok) {
            console.log("No autorizado → redirigiendo");
            window.location.href = "/login";
            return;
        }

        const datos = await res.json();
        console.log("DATOS:", datos);

        const tabla = document.getElementById("tabla");
        tabla.innerHTML = "";

        clientesGlobal = {};

        datos.forEach(r => {
            if (!clientesGlobal[r.dni]) clientesGlobal[r.dni] = [];
            clientesGlobal[r.dni].push(r);
        });

        Object.values(clientesGlobal).forEach(lista => {

            const c = lista[0];
            const restantes = lista.filter(x => x.asistida == 0).length;

            tabla.innerHTML += `
            <tr>
                <td>${c.nombre}</td>
                <td>${c.dni}</td>
                <td>${c.telefono}</td>
                <td>${c.pack}</td>
                <td><button class="btn btn-sm btn-outline-primary" onclick='mostrarClases("${c.dni}")'>Ver clases</button></td>
                <td>${restantes}</td>
                <td></td>
            </tr>
            `;
        });

    } catch (e) {
        console.error("Error cargando reservas", e);
    }
}

/* ================= CALENDARIO ================= */

function obtenerLunes() {
    const hoy = new Date();
    hoy.setDate(hoy.getDate() + (semanaOffset * 7));
    const dia = hoy.getDay();
    const lunes = new Date(hoy);
    lunes.setDate(hoy.getDate() - (dia === 0 ? 6 : dia - 1));
    return lunes;
}

async function cargarCalendario() {

    try {

        const res = await fetch("/reservas", {
            credentials: "include"
        });

        if (!res.ok) {
            window.location.href = "/login";
            return;
        }

        const datos = await res.json();
        const lunes = obtenerLunes();

        const dias = [];

        for (let i = 0; i < 5; i++) {
            const d = new Date(lunes);
            d.setDate(lunes.getDate() + i);

            const fecha =
                d.getFullYear() + "-" +
                String(d.getMonth()+1).padStart(2,"0") + "-" +
                String(d.getDate()).padStart(2,"0");

            dias.push(fecha);
        }

        document.getElementById("tituloSemana").innerText =
            "Semana del " + dias[0] + " al " + dias[4];

        const tabla = document.getElementById("tablaCalendario");

        tabla.innerHTML = `
        <tr>
            <th>Hora</th>
            <th>Lunes</th>
            <th>Martes</th>
            <th>Miércoles</th>
            <th>Jueves</th>
            <th>Viernes</th>
        </tr>
        `;

        horarios.forEach(hora => {

            let fila = `<tr><td><b>${hora}</b></td>`;

            dias.forEach(dia => {

                const personas = datos
                    .filter(r => r.dia === dia && r.hora === hora)
                    .slice(0, 4);

                let contenido = "";

                personas.forEach(p => {

                    let color = p.asistida == 1 ? "bg-success" : "bg-warning";

                    contenido += `
                    <div class="${color} text-white rounded p-1 mb-1 small">
                        ${p.nombre}
                    </div>
                    `;
                });

                fila += `<td>${contenido}</td>`;
            });

            fila += "</tr>";
            tabla.innerHTML += fila;
        });

    } catch (e) {
        console.error("Error calendario", e);
    }
}

/* ================= ASISTENCIA ================= */

async function confirmarAsistencia() {

    const dni = document.getElementById("dniInput").value;

    const res = await fetch("/asistencia", {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ dni })
    });

    const msg = await res.text();
    alert(msg);

    cargarReservas();
    cargarCalendario();
}

/* ================= INIT ================= */

cargarReservas();
cargarCalendario();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
