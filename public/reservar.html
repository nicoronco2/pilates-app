<!DOCTYPE html>
<html>
<head>
    <title>Reservar clase</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        @media (max-width:576px){
            h2{ font-size:24px; }
            .card-body{ padding:20px 15px; }
        }
    </style>

</head>
<body class="bg-light">

<div class="container py-4 py-md-5">

    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6">

            <div class="card shadow-sm">
                <div class="card-body">

                    <h2 class="text-center mb-4">Reserva de clases</h2>

                    <form id="formReserva">

                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" id="nombre" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Teléfono</label>
                            <input type="text" id="telefono" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">DNI</label>
                            <input type="text" id="dni" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Elegir pack</label>

                            <select id="pack" class="form-select" onchange="generarClases()" required>
                                <option value="">Elegí un pack</option>
                                <option value="4">1 vez por semana (4 clases) → $38.000</option>
                                <option value="8">2 veces por semana (8 clases) → $48.000</option>
                                <option value="12">3 veces por semana (12 clases) → $60.000</option>
                                <option value="16">4 veces por semana (16 clases) → $70.000</option>
                            </select>
                        </div>

                        <!-- CLASES DINÁMICAS -->
                        <div id="clasesContainer" class="mt-3"></div>

                        <button type="submit" class="btn btn-primary w-100 mt-4">
                            Reservar clases
                        </button>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

<script>

/* GENERAR CAMPOS SEGÚN PACK */
function generarClases() {

    const pack = document.getElementById("pack").value;
    const container = document.getElementById("clasesContainer");

    container.innerHTML = "";

    if (!pack) return;

    const hoy = new Date().toISOString().split("T")[0];

    for (let i = 0; i < pack; i++) {

        container.innerHTML += `
        <div class="card p-3 mb-3 shadow-sm">
            <h6 class="mb-3">Clase ${i + 1}</h6>

            <label class="form-label">Día</label>
            <input type="date" class="form-control mb-2" min="${hoy}" id="dia${i}" required>

            <label class="form-label">Hora</label>
            <select class="form-select" id="hora${i}" required>
                <option value="">Seleccionar horario</option>
                <option value="08:00">08:00</option>
                <option value="09:00">09:00</option>
                <option value="10:00">10:00</option>
                <option value="11:00">11:00</option>
                <option value="16:00">16:00</option>
                <option value="17:00">17:00</option>
                <option value="18:00">18:00</option>
                <option value="19:00">19:00</option>
            </select>
        </div>
        `;
    }
}

/* ENVIAR RESERVA */
document.getElementById("formReserva").addEventListener("submit", async (e) => {

    e.preventDefault();

    const nombre = document.getElementById("nombre").value;
    const telefono = document.getElementById("telefono").value;
    const dni = document.getElementById("dni").value;
    const pack = document.getElementById("pack").value;

    const clases = [];

    for (let i = 0; i < pack; i++) {

        const dia = document.getElementById(`dia${i}`).value;
        const hora = document.getElementById(`hora${i}`).value;

        if (!dia || !hora) {
            alert("Completá todas las clases");
            return;
        }

        clases.push({ dia, hora });
    }

    const res = await fetch("/reservar", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            nombre,
            telefono,
            dni,
            pack,
            clases
        })
    });

    const msg = await res.text();
    alert(msg);

    if (msg.includes("correctamente")) {
        document.getElementById("formReserva").reset();
        document.getElementById("clasesContainer").innerHTML = "";
    }

});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
